<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>音乐播放器</title>

<style>
body {
  font-family: -apple-system;
  background: #f2f3f5;
  margin: 0;
}

/* 手机容器 */
.container {
  max-width: 480px;
  margin: auto;
  padding: 15px;
}

h2 {
  text-align: center;
  font-size: 18px;
}

/* 搜索栏 */
.top-bar {
  display: flex;
  gap: 8px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: #ff4d4f;
  color: white;
}

/* 列表 */
.card {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* 播放页 */
#songPage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 999;
  display: none;
}

/* 关闭 */
#closeBtn {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 30px;
  color: white;
}

/* 圆形风景图 */
#disc {
  width: 220px;
  height: 220px;
  margin: 80px auto 20px;
  border-radius: 50%;
  background-image: url('https://b0.bdstatic.com/15f97cf6b3a5b30613647546516d3b92.jpg');
  background-size: cover;
}

.song-name {
  color: white;
  text-align: center;
  font-size: 20px;
}

.artist-name {
  color: gray;
  text-align: center;
}

.lyrics {
  text-align: center;
  color: #bbb;
  margin-top: 20px;
  padding: 0 10px;
  max-height: 200px;
  overflow: auto;
}

/* 控制按钮 */
.controls {
  text-align: center;
  margin-top: 30px;
}

.controls button {
  font-size: 16px;
  background: none;
}

/* ❤️收藏 */
#favBtn {
  font-size: 28px;
}
</style>

</head>

<body>

<div class="container">

<h2>🎧 音乐播放器</h2>

<div class="top-bar">
  <input id="keyword" placeholder="歌曲">
  <button onclick="search()">搜索</button>
  <button onclick="showFavorites()">❤收藏</button>
</div>

<div id="list"></div>

<audio id="player" controls style="width:100%"></audio>

</div>

<!-- 播放页 -->
<div id="songPage">
  <div id="closeBtn" onclick="closePlayer()">✖</div>

  <div id="disc"></div>

  <div id="songName" class="song-name"></div>
  <div id="artistName" class="artist-name"></div>

  <div id="lyrics" class="lyrics">加载歌词...</div>

  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlayPause()">⏯</button>
    <button onclick="nextSong()">⏭</button>
    <button id="favBtn" onclick="toggleFav()">♡</button>
  </div>
</div>

<script>
// ===== 原接口（不动） =====
const sources = [
  {
    name: "网易",
    search: (k) => `https://api.imjad.cn/cloudmusic/?type=search&s=${k}`,
    song: (id) => `https://api.imjad.cn/cloudmusic/?type=song&id=${id}`,
    lyric: (id) => `https://api.imjad.cn/cloudmusic/?type=lyric&id=${id}`,
    parseSearch: (data) => data.result.songs.map(s => ({
      id: s.id,
      name: s.name,
      artist: s.artists[0].name
    })),
    parseUrl: (data) => data.data[0].url,
    parseLyric: (data) => data.lrc ? data.lrc.lyric : "暂无歌词"
  },
  {
    name: "备用",
    search: (k) => `https://music-api.gdstudio.xyz/api.php?types=search&source=netease&name=${k}`,
    song: (id) => `https://music-api.gdstudio.xyz/api.php?types=url&source=netease&id=${id}`,
    lyric: (id) => `https://music-api.gdstudio.xyz/api.php?types=lyric&source=netease&id=${id}`,
    parseSearch: (data) => data.map(s => ({
      id: s.id,
      name: s.name,
      artist: s.artist
    })),
    parseUrl: (data) => data.url,
    parseLyric: (data) => data.lyric || "暂无歌词"
  }
];

// ===== 收藏（不动逻辑）=====
function getFav() {
  return JSON.parse(localStorage.getItem("fav") || "[]");
}
function saveFav(list) {
  localStorage.setItem("fav", JSON.stringify(list));
}
function isFav(id) {
  return getFav().some(s => s.id == id);
}

// ===== 新增：取消收藏 =====
function removeFav(id) {
  let fav = getFav();
  fav = fav.filter(s => s.id != id);
  saveFav(fav);
  showFavorites();
}

let currentSongs = [];
let currentSongIndex = 0;

// ===== 搜索（原逻辑不动）=====
async function search() {
  const k = document.getElementById("keyword").value;
  const listEl = document.getElementById("list");
  listEl.innerHTML = "搜索中...";

  for (let s of sources) {
    try {
      const res = await fetch(s.search(k));
      const data = await res.json();
      let songs = s.parseSearch(data);

      if (songs.length) {
        currentSongs = songs;
        renderList(songs);
        return;
      }
    } catch(e) {}
  }

  listEl.innerHTML = "没有结果";
}

// ===== 列表 =====
function renderList(songs) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  songs.slice(0,20).forEach((song,i)=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div onclick="play('${song.id}',${i})">
        <div>${song.name}</div>
        <div style="font-size:12px;color:gray">${song.artist}</div>
      </div>
    `;

    list.appendChild(div);
  });
}

// ===== 播放 =====
async function play(id,index){
  currentSongIndex = index;

  document.querySelector(".container").style.display="none";
  document.getElementById("songPage").style.display="block";

  const player = document.getElementById("player");

  for (let s of sources){
    try{
      const res = await fetch(s.song(id));
      const data = await res.json();
      const url = s.parseUrl(data);

      if(url){
        player.src = url;
        player.play();
        showSong(currentSongs[index],s);
        return;
      }
    }catch(e){}
  }
}

// ===== 显示歌曲 =====
async function showSong(song,source){
  document.getElementById("songName").innerText = song.name;
  document.getElementById("artistName").innerText = song.artist;

  // ❤️初始化
  const btn = document.getElementById("favBtn");
  btn.innerText = isFav(song.id) ? "♥" : "♡";

  // 歌词
  try{
    const res = await fetch(source.lyric(song.id));
    const data = await res.json();
    document.getElementById("lyrics").innerText = source.parseLyric(data);
  }catch{
    document.getElementById("lyrics").innerText = "暂无歌词";
  }
}

// ===== 播放控制 =====
function togglePlayPause(){
  const p = document.getElementById("player");
  if(p.paused) p.play(); else p.pause();
}

// ===== 上一首下一首 =====
function prevSong(){
  currentSongIndex = (currentSongIndex-1+currentSongs.length)%currentSongs.length;
  play(currentSongs[currentSongIndex].id,currentSongIndex);
}
function nextSong(){
  currentSongIndex = (currentSongIndex+1)%currentSongs.length;
  play(currentSongs[currentSongIndex].id,currentSongIndex);
}

// ===== 收藏切换（核心修复❤️）=====
function toggleFav(){
  const song = currentSongs[currentSongIndex];
  let fav = getFav();
  const index = fav.findIndex(s=>s.id==song.id);

  if(index==-1){
    fav.push(song);
  }else{
    fav.splice(index,1);
  }

  saveFav(fav);

  // ❤️只变心
  document.getElementById("favBtn").innerText = index==-1 ? "♥" : "♡";
}

// ===== 收藏页 =====
function showFavorites(){
  const fav = getFav();
  const list = document.getElementById("list");
  list.innerHTML="";

  if(fav.length===0){
    list.innerHTML="暂无收藏";
    return;
  }

  fav.forEach((song,i)=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div onclick="play('${song.id}',${i})">
        <div>${song.name}</div>
        <div style="font-size:12px;color:gray">${song.artist}</div>
      </div>
      <div onclick="removeFav('${song.id}')" style="color:red">❌</div>
    `;

    list.appendChild(div);
  });

  currentSongs = fav;
}

// ===== 关闭播放器 =====
function closePlayer(){
  document.getElementById("songPage").style.display="none";
  document.querySelector(".container").style.display="block";
}
</script>

</body>
</html>
